<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0b0f0c;--panel:#111816;--accent:#00ff88;--accent2:#19c37d;--border:#1c2a25;--text:#e6f2ec;--muted:#8fa39a}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;padding:20px}
  .page-wrap{max-width:900px;margin:0 auto}

  /* Header */
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .cal-header h2{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600}
  .nav-btns{display:flex;gap:6px}
  .nav-btn{background:var(--panel);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
  .nav-btn:hover{border-color:var(--accent2);color:var(--text)}

  /* Day-of-week labels */
  .dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
  .dow-label{text-align:center;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;padding:6px 0}

  /* Calendar grid */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}

  /* Each cell — square via aspect-ratio */
  .cal-day{
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    aspect-ratio:1/1;padding:7px 6px 6px;cursor:pointer;
    transition:border-color .15s,background .15s;
    display:flex;flex-direction:column;align-items:stretch;
    overflow:hidden;position:relative;min-width:0;
  }
  .cal-day:hover{border-color:var(--accent2);background:rgba(255,255,255,.02)}
  .cal-day.empty{background:transparent;border-color:transparent;cursor:default}
  .cal-day.today{border-color:var(--accent2)}
  .cal-day.profit{border-left:3px solid var(--accent)}
  .cal-day.loss{border-left:3px solid #ff5f6d}

  /* Date number stays pinned top-left */
  .day-num{font-size:11px;color:var(--muted);font-weight:500;line-height:1;flex-shrink:0;align-self:flex-start}
  .cal-day.today .day-num{color:var(--accent);font-weight:700}

  /* Trade info — fills remaining space, vertically & horizontally centered */
  .day-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;min-height:0;padding:2px 0}
  .day-count{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;text-align:center;line-height:1.3}
  .day-pnl{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;line-height:1.2}
  .day-pnl.pos{color:var(--accent)}
  .day-pnl.neg{color:#ff5f6d}

  /* Monthly summary cards */
  .month-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}
  .mstat{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
  .mstat .mlbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
  .mstat .mval{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700}
  .mstat .mval.pos{color:var(--accent)}
  .mstat .mval.neg{color:#ff5f6d}

  /* Detail panel */
  .detail{display:none;position:fixed;right:16px;top:50%;transform:translateY(-50%);z-index:100;
    background:var(--panel);border:1px solid var(--border);border-radius:12px;width:280px;
    padding:18px;box-shadow:0 12px 40px rgba(0,0,0,.5);max-height:70vh;overflow-y:auto}
  .detail.open{display:block}
  .detail-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .detail-hdr h3{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600}
  .close-det{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1}
  .trade-item{border-bottom:1px solid var(--border);padding:9px 0}
  .trade-item:last-child{border-bottom:none}
  .ti-top{display:flex;justify-content:space-between;margin-bottom:2px}
  .ti-pair{font-weight:600;font-size:13px}
  .ti-pnl{font-size:13px;font-weight:600}
  .ti-pnl.pos{color:var(--accent)}
  .ti-pnl.neg{color:#ff5f6d}
  .ti-sub{font-size:11px;color:var(--muted)}
  .ti-notes{font-size:11px;color:var(--muted);margin-top:2px;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  @media(max-width:520px){
    .month-stats{grid-template-columns:repeat(2,1fr)}
    .cal-day{padding:4px 3px}
    .day-num{font-size:10px}
    .day-count{font-size:9px}
    .day-pnl{font-size:11px}
  }
</style>
</head>
<body>
<div class="page-wrap">

  <div class="cal-header">
    <h2 id="monthLbl">—</h2>
    <div class="nav-btns">
      <button class="nav-btn" onclick="prev()">‹</button>
      <button class="nav-btn" onclick="goToday()">Today</button>
      <button class="nav-btn" onclick="next()">›</button>
    </div>
  </div>

  <div class="dow-row">
    <div class="dow-label">Sun</div><div class="dow-label">Mon</div>
    <div class="dow-label">Tue</div><div class="dow-label">Wed</div>
    <div class="dow-label">Thu</div><div class="dow-label">Fri</div>
    <div class="dow-label">Sat</div>
  </div>

  <div class="cal-grid" id="calGrid"></div>

  <!-- Monthly summary -->
  <div class="month-stats" id="monthStats">
    <div class="mstat"><div class="mlbl">Trades</div><div class="mval" id="mTrades">0</div></div>
    <div class="mstat"><div class="mlbl">Total PNL</div><div class="mval" id="mPnl">—</div></div>
    <div class="mstat"><div class="mlbl">Win Rate</div><div class="mval" id="mWr">—</div></div>
    <div class="mstat"><div class="mlbl">Best Day</div><div class="mval pos" id="mBest">—</div></div>
  </div>

</div>

<div class="detail" id="detail">
  <div class="detail-hdr">
    <h3 id="detDate">—</h3>
    <button class="close-det" onclick="closeDetail()">✕</button>
  </div>
  <div id="detTrades"></div>
</div>

<script>
function applyTheme(t){
  const r=document.documentElement;
  const dark=t==='dark'||(t==='system'&&!window.matchMedia('(prefers-color-scheme:light)').matches);
  if(!dark){
    r.style.setProperty('--bg','#f6faf8');r.style.setProperty('--panel','#ffffff');
    r.style.setProperty('--accent','#19c37d');r.style.setProperty('--accent2','#0fa86a');
    r.style.setProperty('--border','#d9e5df');r.style.setProperty('--text','#0f1c17');r.style.setProperty('--muted','#6b8578');
  } else {
    r.style.setProperty('--bg','#0b0f0c');r.style.setProperty('--panel','#111816');
    r.style.setProperty('--accent','#00ff88');r.style.setProperty('--accent2','#19c37d');
    r.style.setProperty('--border','#1c2a25');r.style.setProperty('--text','#e6f2ec');r.style.setProperty('--muted','#8fa39a');
  }
}
(function(){ applyTheme(localStorage.getItem('tl_theme')||'dark'); })();

const jid=localStorage.getItem('tl_current_journal')||'default';
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

let now=new Date(), vy=now.getFullYear(), vm=now.getMonth();

function getTrades(){ return JSON.parse(localStorage.getItem('tl_trades_'+jid)||'[]'); }

function fmtPnl(v){
  const n=parseFloat(v);
  if(isNaN(n)) return '—';
  return (n>=0?'+':'-')+'$'+Math.abs(n).toFixed(2);
}
function fmtPct(v){ return '%'+parseFloat(v).toFixed(1); }

function render(){
  document.getElementById('monthLbl').textContent=MONTHS[vm]+' '+vy;
  const grid=document.getElementById('calGrid');
  const todayStr=now.toISOString().split('T')[0];
  const allTrades=getTrades();

  // Build day map
  const dayMap={};
  allTrades.forEach(t=>{
    if(!t.date) return;
    if(!dayMap[t.date]) dayMap[t.date]=[];
    dayMap[t.date].push(t);
  });

  const first=new Date(vy,vm,1).getDay();
  const daysInMonth=new Date(vy,vm+1,0).getDate();
  let cells='';
  for(let i=0;i<first;i++) cells+='<div class="cal-day empty"></div>';

  // Monthly aggregates
  let mTrades=0, mPnl=0, mWins=0, mValid=0, bestDayPnl=-Infinity, bestDayStr='—';

  for(let d=1;d<=daysInMonth;d++){
    const ds=vy+'-'+String(vm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dt=dayMap[ds]||[];
    const total=dt.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);
    const isToday=ds===todayStr;
    let pnlHtml='';
    if(dt.length){
      const cls=total>=0?'pos':'neg';
      pnlHtml=`<div class="day-pnl ${cls}">${fmtPnl(total)}</div>`;
      // Monthly stats
      mTrades+=dt.length;
      dt.forEach(t=>{ const p=parseFloat(t.pnl); if(!isNaN(p)&&t.pnl!==''){mPnl+=p; mValid++; if(p>0) mWins++;} });
      if(total>bestDayPnl){ bestDayPnl=total; bestDayStr=fmtPnl(total); }
    }
    const borderClass=dt.length?(total>=0?'profit':'loss'):'';
    cells+=`
      <div class="cal-day ${isToday?'today':''} ${borderClass}" onclick="showDetail('${ds}')">
        <div class="day-num">${d}</div>
        ${dt.length?`<div class="day-body"><div class="day-count">${dt.length} trade${dt.length>1?'s':''}</div>${pnlHtml}</div>`:''}
      </div>`;
  }
  grid.innerHTML=cells;

  // Update monthly summary cards
  const wr=mValid?((mWins/mValid)*100):0;
  document.getElementById('mTrades').textContent=mTrades;
  const pnlEl=document.getElementById('mPnl');
  pnlEl.textContent=mValid?fmtPnl(mPnl):'—';
  pnlEl.className='mval '+(mPnl>=0?'pos':'neg');
  document.getElementById('mWr').textContent=mValid?fmtPct(wr):'—';
  const bestEl=document.getElementById('mBest');
  bestEl.textContent=bestDayPnl>-Infinity?bestDayStr:'—';
}

function showDetail(ds){
  const trades=getTrades().filter(t=>t.date===ds);
  if(!trades.length) return;
  document.getElementById('detDate').textContent=ds;
  document.getElementById('detTrades').innerHTML=trades.map(t=>{
    const pnl=parseFloat(t.pnl)||0;
    const cls=pnl>0?'pos':pnl<0?'neg':'';
    const tags=[...(t.strategy||[]),...(t.timeframe||[])].join(' · ');
    return `<div class="trade-item">
      <div class="ti-top">
        <span class="ti-pair">${t.pair||'—'}</span>
        <span class="ti-pnl ${cls}">${t.pnl!==''&&!isNaN(pnl)?fmtPnl(t.pnl):'—'}</span>
      </div>
      <div class="ti-sub">${t.position||''}${t.time?' · '+t.time:''}${tags?' · '+tags:''}</div>
      ${t.notes?`<div class="ti-notes">${t.notes}</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('detail').classList.add('open');
}

function closeDetail(){ document.getElementById('detail').classList.remove('open'); }
function prev(){ vm--; if(vm<0){vm=11;vy--;} closeDetail(); render(); }
function next(){ vm++; if(vm>11){vm=0;vy++;} closeDetail(); render(); }
function goToday(){ vy=now.getFullYear(); vm=now.getMonth(); closeDetail(); render(); }

render();
</script>
</body>
</html>
